global:
  scrape_interval: 10s
  scrape_timeout: 5s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'op-geth'
    metrics_path: /debug/metrics/prometheus
    static_configs:
      - targets: ['op-geth.default.svc.cluster.local:9090']

  - job_name: 'op-geth-ext'
    metrics_path: /debug/metrics/prometheus
    static_configs:
      - targets: ['op-geth-ext.default.svc.cluster.local:9090']

  - job_name: 'op-rbuilder'
    metrics_path: /metrics
    static_configs:
      - targets: ['op-rbuilder.default.svc.cluster.local:9090']
